<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZKA Labs — Playground</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#222;
  --text:#e8e8e8;--text2:#888;--text3:#555;
  --accent:#c8ff00;--accent2:#a8d600;
  --radius:10px;--radius-sm:6px;
  --sidebar:340px;
  --font:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
  --mono:'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
::selection{background:var(--accent);color:#000}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar);min-width:var(--sidebar);display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface)}
.sidebar-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo{font-weight:700;font-size:15px;letter-spacing:-0.3px;display:flex;align-items:center;gap:6px}
.logo span{color:var(--accent)}
.status{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface2);color:var(--text3);margin-left:auto;font-family:var(--mono)}
.status.ready{color:var(--accent);background:rgba(200,255,0,0.08)}
.status.building{color:#f0a030;background:rgba(240,160,48,0.08);animation:pulse 1.5s infinite}
.status.error{color:#f44;background:rgba(255,68,68,0.08)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.chips{padding:10px 12px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.chip{padding:6px 12px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(200,255,0,0.04)}

.chat{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:0;-webkit-overflow-scrolling:touch}
.msg{max-width:90%;padding:10px 14px;border-radius:var(--radius);font-size:13px;line-height:1.5;word-break:break-word;animation:fadeUp .25s ease}
.msg.user{align-self:flex-end;background:var(--accent);color:#000;border-bottom-right-radius:3px}
.msg.ai{align-self:flex-start;background:var(--surface2);color:var(--text);border-bottom-left-radius:3px}
.msg.ai.error{border:1px solid rgba(255,68,68,0.3);color:#f88}
.msg.system{align-self:center;color:var(--text3);font-size:11px;padding:4px 0}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.chat-input{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-size:13px;outline:none;transition:border .15s;font-family:var(--font)}
.chat-input input:focus{border-color:var(--accent)}
.chat-input input::placeholder{color:var(--text3)}
.chat-input button{width:40px;height:40px;border-radius:var(--radius);border:none;background:var(--accent);color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chat-input button:hover{background:var(--accent2)}
.chat-input button:disabled{opacity:.3;cursor:not-allowed}
.chat-input button svg{width:18px;height:18px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.main-head{height:44px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;background:var(--surface)}
.tab-group{display:flex;gap:2px;background:var(--surface2);border-radius:var(--radius-sm);padding:2px}
.tab{padding:5px 14px;border-radius:4px;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;border:none;background:none;font-family:var(--font)}
.tab.active{background:var(--border);color:var(--text)}
.tab:hover:not(.active){color:var(--text2)}
.main-head .spacer{flex:1}
.device-btn{width:30px;height:30px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.device-btn:hover,.device-btn.active{border-color:var(--accent);color:var(--accent)}
.device-btn svg{width:16px;height:16px}
.url-bar{flex:1;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;font-size:11px;color:var(--text2);font-family:var(--mono);display:flex;align-items:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}

/* PREVIEW */
.preview-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0d0d0d;position:relative}
.preview-frame{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,0.5);transition:width .3s,height .3s}
.preview-frame iframe{width:100%;height:100%;border:none;display:block}
.preview-frame.full{width:100%;height:100%;border-radius:0}
.preview-frame.desktop{width:100%;height:100%;border-radius:0}
.preview-frame.tablet{width:768px;height:calc(100% - 40px);border-radius:12px}
.preview-frame.mobile{width:375px;height:calc(100% - 40px);border-radius:24px;border:3px solid #333}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text3);text-align:center;padding:40px}
.empty-state .icon{font-size:48px;opacity:.3}
.empty-state p{font-size:14px;max-width:300px;line-height:1.5}
.empty-state .hint{font-size:12px;color:var(--text3);opacity:.5}

/* CODE VIEW */
.code-area{flex:1;display:none;overflow:hidden}
.code-area.visible{display:flex}
.code-sidebar{width:180px;border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);padding:8px 0}
.file-item{padding:8px 14px;font-size:12px;color:var(--text3);cursor:pointer;font-family:var(--mono);transition:all .15s;display:flex;align-items:center;gap:6px}
.file-item:hover{color:var(--text2);background:var(--surface2)}
.file-item.active{color:var(--accent);background:rgba(200,255,0,0.04);border-right:2px solid var(--accent)}
.file-icon{font-size:10px;opacity:.5}
.code-content{flex:1;overflow:auto;background:#0d0d0d;padding:16px}
.code-content pre{font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--text2);white-space:pre-wrap;word-break:break-word;tab-size:2}
.code-content .line{display:flex}
.code-content .ln{color:var(--text3);min-width:40px;text-align:right;padding-right:16px;user-select:none;opacity:.4}
.code-content .lc{flex:1}

/* MOBILE */
@media(max-width:768px){
  .app{flex-direction:column}
  .sidebar{width:100%;min-width:100%;height:calc(100% - 48px);position:absolute;z-index:10;transition:transform .25s}
  .sidebar.hidden{transform:translateX(-100%)}
  .main{width:100%;height:calc(100% - 48px)}
  .mobile-tabs{display:flex!important;height:48px;border-top:1px solid var(--border);background:var(--surface)}

  .mobile-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;border:none;background:none;font-family:var(--font)}
  .mobile-tab.active{color:var(--accent);background:rgba(200,255,0,0.04)}
  .mobile-tab svg{width:16px;height:16px}
  .preview-frame.tablet,.preview-frame.mobile{width:100%;height:100%;border-radius:0;border:none}
  .chips{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:8px 12px}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex-shrink:0}
  .code-sidebar{width:120px}
}
.mobile-tabs{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="logo">🧪 <span>ZKA Labs</span></div>
      <div class="status" id="status">IDLE</div>
    </div>
    <div class="chips" id="chips">
      <div class="chip" data-prompt="A modern portfolio with hero section, projects grid, and contact form">Portfolio</div>
      <div class="chip" data-prompt="A task manager app with add, delete, mark complete, and filter by status">Task Manager</div>
      <div class="chip" data-prompt="A weather dashboard with city search, 5-day forecast cards, and temperature chart">Weather App</div>
      <div class="chip" data-prompt="A restaurant menu page with food categories, item cards with prices, and an order cart">Restaurant</div>
      <div class="chip" data-prompt="A pomodoro timer with work/break sessions, sound notification, and session counter">Pomodoro</div>
      <div class="chip" data-prompt="A kanban board with drag-and-drop columns: To Do, In Progress, Done">Kanban</div>
    </div>
    <div class="chat" id="chat">
      <div class="msg system">Describe what you want to build</div>
    </div>
    <div class="chat-input">
      <input type="text" id="promptInput" placeholder="Describe your app..." autocomplete="off">
      <button id="sendBtn" onclick="doSend()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div><!-- /sidebar -->
  <div class="mobile-tabs" id="mobileTabs">
  <button class="mobile-tab active" onclick="mobileTab('chat')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Chat
  </button>
  <button class="mobile-tab" onclick="mobileTab('preview')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    Preview
  </button>
  <button class="mobile-tab" onclick="mobileTab('code')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    Code
  </button>
</div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-head">
      <div class="tab-group">
        <button class="tab active" onclick="switchView('preview')" id="tabPreview">Preview</button>
        <button class="tab" onclick="switchView('code')" id="tabCode">Code</button>
      </div>
      <div class="spacer"></div>
      <div class="url-bar" id="urlBar">zk://ready</div>
      <div class="spacer"></div>
      <button class="device-btn active" onclick="setDevice('desktop')" title="Desktop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </button>
      <button class="device-btn" onclick="setDevice('tablet')" title="Tablet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
      </button>
      <button class="device-btn" onclick="setDevice('mobile')" title="Mobile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
      </button>
    </div>

    <!-- PREVIEW VIEW -->
    <div class="preview-area" id="previewArea">
      <div class="preview-frame full" id="previewFrame">
        <iframe id="previewIframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      </div>
      <div class="empty-state" id="emptyState">
        <div class="icon">⚡</div>
        <p>Describe your app in the chat and watch it come to life</p>
        <div class="hint">Powered by ZKA Labs 🧪</div>
      </div>
    </div>

    <!-- CODE VIEW -->
    <div class="code-area" id="codeArea">
      <div class="code-sidebar" id="codeSidebar"></div>
      <div class="code-content" id="codeContent">
        <div class="empty-state">
          <div class="icon">{ }</div>
          <p>Generate an app to view its source code</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://api.zk0x.app';
const KEY = 'zk-playground-public-2024';
const MODELS = {'zk-v3z':'Flagship','zk-v2b':'Fast','zk-v1b':'Lite'};

let busy = false;
let files = {};
let activeFile = '';
let sandboxUrl = '';
let currentView = 'preview';
let currentDevice = 'desktop';
let chatHistory = [];

// Init
document.getElementById('promptInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
});

// Chips
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    document.getElementById('promptInput').value = c.dataset.prompt;
    doSend();
  });
});

// Status
function setStatus(s, cls) {
  const el = document.getElementById('status');
  el.textContent = s;
  el.className = 'status ' + (cls || '');
}

// Messages
function addMsg(text, type) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// Send
async function doSend() {
  const input = document.getElementById('promptInput');
  const prompt = input.value.trim();
  if (!prompt || busy) return;

  input.value = '';
  addMsg(prompt, 'user');
  chatHistory.push({role:'user', content:prompt});

  setStatus('BUILDING', 'building');
  document.getElementById('sendBtn').disabled = true;
  busy = true;

  const thinkingMsg = addMsg('Thinking...', 'ai');

  try {
    const resp = await fetch(API + '/v1/sandbox/generate', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + KEY
      },
      body: JSON.stringify({prompt, model: 'zk-v3z'})
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || 'Generation failed (' + resp.status + ')');
    }

    const data = await resp.json();
    const sandbox = data.sandbox;
    files = data.code || {};

    sandboxUrl = sandbox.url || ('https://' + sandbox.id + '-preview.zk0x.app');

    thinkingMsg.textContent = 'Done! Your app is ready.';
    addMsg('Live at ' + sandboxUrl, 'system');

    // Show preview
    document.getElementById('emptyState').style.display = 'none';
    const iframe = document.getElementById('previewIframe');
    iframe.src = sandboxUrl;
    document.getElementById('urlBar').textContent = sandboxUrl.replace('https://', '');

    // Update code view
    renderCodeView();

    setStatus('READY', 'ready');
    chatHistory.push({role:'assistant', content:'App is live: ' + sandboxUrl});

    // Auto-switch to preview on mobile
    if (window.innerWidth <= 768) mobileTab('preview');

  } catch (e) {
    thinkingMsg.textContent = 'Error: ' + e.message;
    thinkingMsg.classList.add('error');
    setStatus('ERROR', 'error');
    console.error(e);
  } finally {
    busy = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// View switching
function switchView(view) {
  currentView = view;
  document.getElementById('tabPreview').classList.toggle('active', view === 'preview');
  document.getElementById('tabCode').classList.toggle('active', view === 'code');
  document.getElementById('previewArea').style.display = view === 'preview' ? 'flex' : 'none';
  document.getElementById('codeArea').classList.toggle('visible', view === 'code');
}

// Device switching
function setDevice(device) {
  currentDevice = device;
  const frame = document.getElementById('previewFrame');
  frame.className = 'preview-frame ' + (device === 'desktop' ? 'full' : device);
  document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.device-btn').classList.add('active');
}

// Code view
function renderCodeView() {
  const sidebar = document.getElementById('codeSidebar');
  const content = document.getElementById('codeContent');
  sidebar.innerHTML = '';

  const fileNames = Object.keys(files);
  if (!fileNames.length) return;

  fileNames.forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'file-item' + (i === 0 ? ' active' : '');
    div.innerHTML = '<span class="file-icon">📄</span>' + name;
    div.onclick = () => showFile(name);
    sidebar.appendChild(div);
  });

  showFile(fileNames[0]);
}

function showFile(name) {
  activeFile = name;
  document.querySelectorAll('.file-item').forEach(el => {
    el.classList.toggle('active', el.textContent.trim() === name);
  });

  const code = files[name] || '';
  const lines = code.split('\n');
  const content = document.getElementById('codeContent');

  let html = '<pre>';
  lines.forEach((line, i) => {
    html += '<div class="line"><span class="ln">' + (i + 1) + '</span><span class="lc">' + escapeHtml(line) + '</span></div>';
  });
  html += '</pre>';
  content.innerHTML = html;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Mobile tabs
function mobileTab(tab) {
  document.querySelectorAll('.mobile-tab').forEach((el, i) => {
    el.classList.toggle('active', ['chat','preview','code'][i] === tab);
  });

  const sidebar = document.getElementById('sidebar');
  const main = document.querySelector('.main');

  if (tab === 'chat') {
    sidebar.classList.remove('hidden');
    sidebar.style.display = 'flex';
    main.style.display = 'none';
  } else {
    sidebar.classList.add('hidden');
    setTimeout(() => { sidebar.style.display = 'none'; }, 250);
    main.style.display = 'flex';
    switchView(tab);
  }
}

// Health check
async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const d = await r.json();
    if (d.status === 'ok') setStatus('IDLE', '');
    else setStatus('OFFLINE', 'error');
  } catch {
    setStatus('OFFLINE', 'error');
  }
}
checkHealth();

// Auto-focus
document.getElementById('promptInput').focus();
</script>
</body>
</html>
