<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZKA Playground — Build apps with AI, free</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--bg-panel:#0a0a0a;--bg-surface:#111;--bg-input:#0d0d0d;--border:#1a1a1a;--text:#e5e5e5;--text-dim:#666;--text-dimmer:#444;--accent:#c8ff00;--accent-dim:rgba(200,255,0,.12);--red:#ff4444;--font-mono:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;overflow:hidden}
::selection{background:var(--accent);color:#000}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

.app{display:flex;flex-direction:column;height:100dvh;height:100vh}

.navbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:44px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);text-decoration:none}
.nav-brand svg{width:16px;height:16px}
.nav-sep{width:1px;height:20px;background:var(--border)}
.nav-status{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-dim)}
.dot{width:6px;height:6px;border-radius:50%;background:#333}
.dot.on{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.dot.err{background:var(--red)}
.nav-model{margin-left:auto;padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg-input);color:var(--text);font-family:var(--font-mono);font-size:10px;cursor:pointer}
.nav-links{display:flex;align-items:center;gap:16px;margin-left:16px}
.nav-link{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);text-decoration:none}
.nav-link:hover{color:var(--text)}
.nav-btn{padding:5px 14px;border:1px solid var(--accent);border-radius:4px;background:transparent;color:var(--accent);font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.nav-btn:hover{background:var(--accent-dim)}

.main{display:flex;flex:1;overflow:hidden}

/* CHAT */
.chat-panel{width:360px;min-width:300px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--bg-panel)}
.chat-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border)}
.chat-tab{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;padding:3px 8px;border-radius:3px}
.chat-tab.active{color:var(--text);background:rgba(255,255,255,.05)}
.chat-idle{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-dimmer);margin-left:auto}
.chat-messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.msg{font-size:12px;line-height:1.6;padding:8px 10px;border-radius:6px;word-break:break-word;white-space:pre-wrap}
.msg.user{background:rgba(255,255,255,.04);border:1px solid var(--border);align-self:flex-end;max-width:90%}
.msg.assistant{color:var(--text-dim);align-self:flex-start}
.msg.error{color:var(--red);font-size:11px;border:1px solid rgba(255,68,68,.2);background:rgba(255,68,68,.05)}

.chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 10px}
.chip{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:rgba(255,255,255,.02);color:var(--text-dim);font-size:11px;line-height:1.4;cursor:pointer}
.chip:hover{border-color:var(--text-dim);color:var(--text)}
.chip-title{font-weight:600;color:var(--text);font-size:10px;letter-spacing:.04em;display:block;margin-bottom:2px}

.chat-input-area{border-top:1px solid var(--border);padding:10px 14px}
.chat-input-wrap{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;min-height:38px;max-height:120px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-input);color:var(--text);font-family:var(--font-mono);font-size:12px;resize:none;outline:none;line-height:1.5}
.chat-input:focus{border-color:var(--text-dim)}
.chat-input::placeholder{color:var(--text-dimmer)}
.chat-send{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-dim);cursor:pointer;flex-shrink:0}
.chat-send:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.chat-send:disabled{opacity:.3;cursor:not-allowed}

/* PREVIEW + CODE */
.preview-panel{flex:1;display:flex;flex-direction:column;background:var(--bg)}
.preview-header{display:flex;align-items:center;padding:0 14px;height:36px;border-bottom:1px solid var(--border);flex-shrink:0}
.preview-tab{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dimmer);cursor:pointer;padding:8px 12px;border-bottom:2px solid transparent}
.preview-tab:hover{color:var(--text-dim)}
.preview-tab.active{color:var(--text);border-bottom-color:var(--text)}
.preview-meta{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:10px;color:var(--text-dimmer)}
.preview-responsive{display:flex;gap:2px;margin-left:8px}
.preview-responsive button{padding:3px 6px;border:1px solid transparent;border-radius:3px;background:transparent;color:var(--text-dimmer);font-size:11px;cursor:pointer}
.preview-responsive button.active{color:var(--text);background:rgba(255,255,255,.05);border-color:var(--border)}
.preview-action{padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text-dim);font-family:var(--font-mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer}

.preview-body{flex:1;position:relative;overflow:hidden}
.frame-wrap{display:flex;justify-content:center;align-items:flex-start;height:100%;overflow:auto;background:#0d0d0d}
.frame-wrap.mobile{padding:20px}
.frame-wrap.mobile iframe{width:375px;height:667px;border-radius:24px;border:3px solid #333}
.frame-wrap.tablet{padding:16px}
.frame-wrap.tablet iframe{width:768px;height:100%;border-radius:12px;border:2px solid #222}
.frame-wrap.desktop iframe{width:100%;height:100%;border:none}
.preview-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-dimmer);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.preview-empty svg{width:32px;height:32px;opacity:.15}

/* CODE */
.code-body{display:none;position:absolute;inset:0;z-index:10;background:var(--bg);overflow:hidden}
.code-layout{display:flex;height:100%}
.code-sidebar{width:200px;border-right:1px solid var(--border);background:var(--bg-panel);overflow-y:auto;flex-shrink:0}
.code-sidebar-title{padding:10px 12px 6px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dimmer);border-bottom:1px solid var(--border)}
.file-item{display:flex;align-items:center;gap:6px;padding:5px 12px;font-size:11px;color:var(--text-dim);cursor:pointer;border-left:2px solid transparent}
.file-item:hover{background:rgba(255,255,255,.03);color:var(--text)}
.file-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(200,255,0,.04)}
.file-icon{font-size:10px;opacity:.5}
.code-viewer{flex:1;overflow:auto;padding:16px 20px;background:var(--bg)}
.code-path{font-size:10px;color:var(--text-dimmer);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.code-content{font-size:12px;line-height:1.7;color:var(--text-dim);white-space:pre;word-break:break-word;font-family:var(--font-mono);tab-size:2;overflow-x:auto}
.code-content .ln{display:inline-block;width:40px;text-align:right;padding-right:14px;color:var(--text-dimmer);opacity:.35;user-select:none}

.gen-bar{height:2px;background:var(--bg);overflow:hidden;position:relative}
.gen-bar.on::after{content:'';position:absolute;left:-40%;width:40%;height:100%;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:slide 1.2s ease-in-out infinite}
@keyframes slide{to{left:100%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.blink{animation:pulse 1.5s ease-in-out infinite}

@media(max-width:768px){
  .main{flex-direction:column}
  .chat-panel{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:45vh}
  .nav-links{display:none}
  .code-sidebar{width:140px}
}
@media(max-width:480px){
  .navbar{padding:0 10px;gap:8px}
  .code-sidebar{width:120px}
}
</style>
</head>
<body>
<div class="app">
  <nav class="navbar">
    <span class="nav-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>
      ZKA PLAYGROUND
    </span>
    <div class="nav-sep"></div>
    <div class="nav-status"><span class="dot" id="dot"></span><span id="statusTxt">IDLE</span></div>
    <select class="nav-model" id="modelSel">
      <option value="zk-v3z">ZK-V3Z (FLAGSHIP)</option>
      <option value="zk-v2b">ZK-V2B (FAST)</option>
      <option value="zk-v1b">ZK-V1B (LITE)</option>
    </select>
    <div class="nav-links">
      <a class="nav-link" href="https://zka-labs.github.io" target="_blank">LABS</a>
      <a class="nav-link" href="https://zeroknowledge0x.github.io/zk-api" target="_blank">API</a>
      <button class="nav-btn" onclick="newProject()">NEW PROJECT</button>
    </div>
  </nav>
  <div class="gen-bar" id="genBar"></div>

  <div class="main">
    <div class="chat-panel">
      <div class="chat-header">
        <span class="chat-tab active">CHAT</span>
        <span class="chat-idle" id="chatIdle">IDLE</span>
      </div>
      <div class="chat-messages" id="msgs"></div>
      <div class="chips" id="chips">
        <button class="chip" onclick="useChip(this)" data-p="Build a responsive portfolio site with hero, skills grid, project cards, contact form. Dark theme with gradient accents."><span class="chip-title">PORTFOLIO</span>Hero + skills + projects + contact</button>
        <button class="chip" onclick="useChip(this)" data-p="Build a task management app with CRUD, priority levels, filters, progress bar. Persist to localStorage."><span class="chip-title">TASK MANAGER</span>CRUD + priorities + filters</button>
        <button class="chip" onclick="useChip(this)" data-p="Build a weather dashboard with city input, temperature, humidity, wind, 5-day forecast cards."><span class="chip-title">WEATHER</span>City search + forecast</button>
        <button class="chip" onclick="useChip(this)" data-p="Build a restaurant page with hero, menu categories with prices, photo gallery, reservation form, reviews."><span class="chip-title">RESTAURANT</span>Menu + gallery + reservations</button>
      </div>
      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea class="chat-input" id="chatIn" placeholder="Describe what to build..." rows="1" maxlength="5000"></textarea>
          <button class="chat-send" id="sendBtn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="preview-panel">
      <div class="preview-header">
        <span class="preview-tab active" data-t="preview" onclick="switchTab('preview')">PREVIEW</span>
        <span class="preview-tab" data-t="code" onclick="switchTab('code')">CODE</span>
        <div class="preview-meta">
          <span id="fileNum">FILES 0</span>
          <span id="genTime"></span>
        </div>
        <div class="preview-responsive">
          <button class="active" data-m="desktop" onclick="setMode('desktop')">🖥</button>
          <button data-m="tablet" onclick="setMode('tablet')">📱</button>
          <button data-m="mobile" onclick="setMode('mobile')">📲</button>
        </div>
        <button class="preview-action" onclick="downloadZip()" id="dlBtn" style="display:none;margin-left:8px">↓ ZIP</button>
      </div>

      <div class="preview-body">
        <div class="frame-wrap desktop" id="frameWrap">
          <iframe id="frame" sandbox="allow-scripts allow-modals" title="Preview"></iframe>
        </div>
        <div class="preview-empty" id="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <span>WAITING FOR BUILD</span>
          <span style="font-size:9px;opacity:.5">Send a prompt to start</span>
        </div>
        <div class="code-body" id="codeBody">
          <div class="code-layout">
            <div class="code-sidebar" id="sidebar"><div class="code-sidebar-title">FILES</div></div>
            <div class="code-viewer">
              <div class="code-path" id="codePath">—</div>
              <div class="code-content" id="codeContent"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const P = 'https://api.zk0x.app';
const K = 'zk-pla' + 'yground-public-2024';
let busy = false, files = {}, activeFile = '';

// Init
const chatIn = document.getElementById('chatIn');
const sendBtn = document.getElementById('sendBtn');
chatIn.addEventListener('input', () => {
  chatIn.style.height = 'auto';
  chatIn.style.height = Math.min(chatIn.scrollHeight, 120) + 'px';
  sendBtn.disabled = !chatIn.value.trim();
});
chatIn.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !busy && chatIn.value.trim()) { e.preventDefault(); doSend(); }
});
sendBtn.addEventListener('click', doSend);

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  document.getElementById('msgs').appendChild(d);
  d.scrollIntoView({ behavior: 'smooth' });
}

function useChip(el) {
  chatIn.value = el.dataset.p;
  document.getElementById('chips').style.display = 'none';
  doSend();
}

// Send
async function doSend() {
  const text = chatIn.value.trim();
  if (!text || busy) return;
  busy = true;
  chatIn.value = '';
  chatIn.style.height = 'auto';
  sendBtn.disabled = true;
  document.getElementById('chips').style.display = 'none';
  addMsg('user', text);
  setStatus('gen');

  const model = document.getElementById('modelSel').value;
  // Build system prompt - ask for single HTML with inline CSS/JS (auto-split later)
  const sys = "You are an expert web developer. Generate a complete, production-quality single HTML file.\n\n"
    + "RULES:\n"
    + "- Return ONLY the HTML file. No explanations, no markdown, no code fences.\n"
    + "- ALL CSS must be inside <style> tags in the <head>\n"
    + "- ALL JavaScript must be inside <script> tags before </body>\n"
    + "- Use modern CSS (flexbox/grid, variables, responsive)\n"
    + "- Use vanilla JS (no frameworks), ES6+\n"
    + "- Include realistic sample content\n"
    + "- Make it look professional with good typography, spacing, colors\n"
    + "- Smooth transitions and subtle animations\n"
    + "- The page must work immediately when opened in a browser";

  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 120000);

    const res = await fetch(P + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + K },
      body: JSON.stringify({
        model,
        messages: [{ role: 'system', content: sys }, { role: 'user', content: text }],
        max_tokens: 6000,
        stream: false
      }),
      signal: ctrl.signal
    });
    clearTimeout(timer);

    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    const content = data.choices?.[0]?.message?.content || '';
    if (!content) throw new Error('Empty response');

    const parsed = parseFiles(content);
    files = parsed;
    renderTree();
    selectFile(Object.keys(parsed)[0]);
    renderPreview();
    document.getElementById('fileNum').textContent = 'FILES ' + Object.keys(parsed).length;
    const elapsed = data.usage ? '' : '';
    document.getElementById('genTime').textContent = Object.keys(parsed).length + ' files';
    setStatus('ok');
    addMsg('assistant', 'Generated ' + Object.keys(parsed).length + ' files: ' + Object.keys(parsed).join(', '));
    document.getElementById('dlBtn').style.display = '';
  } catch (e) {
    addMsg('error', 'Error: ' + e.message);
    setStatus('err');
  } finally {
    busy = false;
    sendBtn.disabled = !chatIn.value.trim();
    if (!Object.keys(files).length) setStatus('idle');
  }
}

function parseFiles(text) {
  let clean = text.trim();

  // 1. Try JSON first (if AI returned JSON format)
  const jm = clean.match(/\{\"files\"[\s\S]*\}/);
  if (jm) {
    try {
      const obj = JSON.parse(jm[0]);
      if (obj.files && typeof obj.files === 'object') {
        const f = {};
        for (const [k, v] of Object.entries(obj.files)) {
          if (typeof v === 'string' && v.trim()) f[k] = v;
        }
        if (Object.keys(f).length) return f;
      }
    } catch {}
  }

  // 2. Extract HTML directly (most common case)
  let html = clean;
  // Unescape if needed
  if (html.includes('\\n') && !html.includes('\n')) {
    html = html.replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
  }
  // Strip outer code fence if wrapping the whole response
  if (html.startsWith('```')) {
    const m = html.match(/^```(?:html)?\s*\n([\s\S]*?)\n```$/);
    if (m) html = m[1];
  }
  const hm = html.match(/<!DOCTYPE[\s\S]*<\/html>/i) || html.match(/<html[\s\S]*<\/html>/i);
  if (hm) return splitHTML(hm[0]);

  // 3. Last resort
  if (html.includes('<') && html.length > 50) return splitHTML('<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>' + html + '</body></html>');
  return { 'index.html': html };
}

function splitHTML(html) {
  const sm = html.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
  const jm = html.match(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/i);
  const files = {};
  let h = html;
  if (sm) {
    files['style.css'] = sm[1].trim();
    h = h.replace(sm[0], '<link rel="stylesheet" href="style.css">');
  }
  if (jm && !jm[0].includes('src=')) {
    files['app.js'] = jm[1].trim();
    h = h.replace(jm[0], '<scr' + 'ipt src="app.js"></scr' + 'ipt>');
  }
  files['index.html'] = h;
  return files;
}

// File tree
function renderTree() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="code-sidebar-title">FILES</div>';
  const icons = { '.html': '◇', '.css': '◆', '.js': '⬡', '.json': '{}', '.svg': '◈' };
  for (const p of Object.keys(files)) {
    const ext = '.' + p.split('.').pop();
    const d = document.createElement('div');
    d.className = 'file-item';
    d.innerHTML = '<span class="file-icon">' + (icons[ext] || '•') + '</span>' + esc(p);
    d.onclick = () => selectFile(p);
    sb.appendChild(d);
  }
}

function selectFile(p) {
  activeFile = p;
  document.getElementById('codePath').textContent = p;
  const lines = (files[p] || '').split('\n');
  document.getElementById('codeContent').innerHTML = lines.map((l, i) =>
    '<span class="ln">' + (i + 1) + '</span>' + esc(l)
  ).join('\n');
  document.querySelectorAll('.file-item').forEach(el => {
    el.classList.toggle('active', el.textContent.trim() === p);
  });
}

// Preview
function renderPreview() {
  let html = files['index.html'] || '';
  if (!html) return;
  // If we have separate CSS/JS files, inline them into the HTML for preview
  if (files['style.css'] && !html.includes('<style')) {
    html = html.replace('</head>', '<sty' + 'le>' + files['style.css'] + '</sty' + 'le></head>');
  }
  for (const [p, c] of Object.entries(files)) {
    if (p.endsWith('.js') && p !== 'index.html') {
      const tag = '<scr' + 'ipt src="' + p + '"></scr' + 'ipt>';
      if (html.includes(tag)) html = html.replace(tag, '<scr' + 'ipt>' + c + '</scr' + 'ipt>');
    }
  }
  document.getElementById('empty').style.display = 'none';
  document.getElementById('frame').style.display = '';
  document.getElementById('frame').srcdoc = html;
}

// Tabs
function switchTab(t) {
  document.querySelectorAll('.preview-tab').forEach(el => el.classList.toggle('active', el.dataset.t === t));
  const fw = document.getElementById('frameWrap');
  const empty = document.getElementById('empty');
  const code = document.getElementById('codeBody');
  if (t === 'preview') {
    fw.style.display = '';
    empty.style.display = Object.keys(files).length ? 'none' : '';
    code.style.display = 'none';
  } else {
    fw.style.display = 'none';
    empty.style.display = 'none';
    code.style.display = '';
  }
}

// Mode
function setMode(m) {
  document.getElementById('frameWrap').className = 'frame-wrap ' + m;
  document.querySelectorAll('.preview-responsive button').forEach(b => b.classList.toggle('active', b.dataset.m === m));
}

// Status
function setStatus(s) {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('statusTxt');
  const bar = document.getElementById('genBar');
  dot.className = 'dot';
  txt.className = '';
  bar.className = 'gen-bar';
  if (s === 'gen') { dot.classList.add('on'); txt.textContent = 'BUILDING...'; txt.className = 'blink'; bar.classList.add('on'); document.getElementById('chatIdle').textContent = 'GENERATING'; }
  else if (s === 'ok') { dot.classList.add('on'); txt.textContent = 'IDLE'; document.getElementById('chatIdle').textContent = 'IDLE'; }
  else if (s === 'err') { dot.classList.add('err'); txt.textContent = 'ERROR'; document.getElementById('chatIdle').textContent = 'ERROR'; }
  else { txt.textContent = 'IDLE'; document.getElementById('chatIdle').textContent = 'IDLE'; }
}

// Download ZIP
async function downloadZip() {
  if (!Object.keys(files).length) return;
  try {
    const zip = new JSZip();
    for (const [p, c] of Object.entries(files)) zip.file(p, c);
    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'zka-project.zip';
    a.click();
  } catch {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([files['index.html'] || ''], { type: 'text/html' }));
    a.download = 'index.html';
    a.click();
  }
}

function newProject() {
  files = {};
  activeFile = '';
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('chips').style.display = 'flex';
  document.getElementById('frame').style.display = 'none';
  document.getElementById('frame').srcdoc = '';

  document.getElementById('sidebar').innerHTML = '<div class="code-sidebar-title">FILES</div>';
  document.getElementById('dlBtn').style.display = 'none';
  document.getElementById('genTime').textContent = '';
  document.getElementById('fileNum').textContent = 'FILES 0';
  setStatus('idle');
  switchTab('preview');
}
