<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZKA Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #030303;
      --surface: #0a0a0a;
      --surface-2: #0f0f0f;
      --surface-3: #141414;
      --border: #1a1a1a;
      --border-hover: #252525;
      --text: #eaeaea;
      --text-2: #999;
      --text-3: #555;
      --green: #00ff88;
      --green-2: #00cc6a;
      --green-dim: rgba(0,255,136,0.06);
      --green-glow: rgba(0,255,136,0.12);
      --green-border: rgba(0,255,136,0.15);
      --font: 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', 'SF Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    ::selection { background: var(--green); color: var(--bg); }

    /* ── LOADER ── */
    #loader {
      position: fixed; inset: 0; z-index: 10000;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.6s, visibility 0.6s;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }
    .loader-logo { font-family: var(--mono); font-size: 28px; font-weight: 600; margin-bottom: 24px; }
    .loader-logo .g { color: var(--green); }
    .loader-track { width: 160px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .loader-bar { height: 100%; background: var(--green); width: 0; animation: load 1.2s ease forwards; }
    @keyframes load { 0%{width:0} 50%{width:60%} 100%{width:100%} }
    .loader-text { font-family: var(--mono); font-size: 10px; color: var(--text-3); margin-top: 14px; letter-spacing: 3px; }

    /* ── BG ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(3,3,3,0.8); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 900px; margin: 0 auto; padding: 0 32px;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--text); text-decoration: none; }
    .nav-logo .g { color: var(--green); }
    .nav-links { display: flex; gap: 24px; list-style: none; }
    .nav-links a { color: var(--text-2); text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.15s; }
    .nav-links a:hover { color: var(--green); }

    /* ── MAIN CHAT CONTAINER ── */
    .chat-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 56px auto 0;
      padding: 0;
      position: relative;
      z-index: 10;
      height: calc(100vh - 56px);
    }

    /* ── CHAT HEADER ── */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(3,3,3,0.5);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }
    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .chat-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--green-dim);
      border: 1.5px solid var(--green-border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 18px; font-weight: 700;
      color: var(--green);
    }
    .chat-name { font-weight: 700; font-size: 16px; }
    .chat-status {
      font-size: 12px; color: var(--text-3);
      display: flex; align-items: center; gap: 6px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; box-shadow:0 0 8px rgba(0,255,136,0.4); }
      50% { opacity:0.5; box-shadow:none; }
    }
    .chat-header-right {
      display: flex; align-items: center; gap: 8px;
    }
    .model-select {
      font-family: var(--mono); font-size: 11px;
      padding: 6px 10px;
      background: var(--surface-3); border: 1px solid var(--border);
      border-radius: 6px; color: var(--green);
      cursor: pointer; outline: none;
      transition: border-color 0.15s;
    }
    .model-select:hover { border-color: var(--border-hover); }
    .model-select option { background: var(--surface-3); color: var(--text); }
    .chat-clear {
      font-family: var(--mono); font-size: 11px;
      padding: 6px 12px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-3);
      cursor: pointer; transition: all 0.15s;
    }
    .chat-clear:hover { border-color: #f44; color: #f44; }

    /* ── MESSAGES AREA ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome message */
    .chat-welcome {
      text-align: center;
      padding: 60px 20px;
    }
    .chat-welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.6;
    }
    .chat-welcome-title {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 8px;
    }
    .chat-welcome-desc {
      font-size: 14px;
      color: var(--text-3);
      max-width: 360px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── BUBBLES ── */
    .chat-bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      animation: bubbleIn 0.25s ease;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .bubble-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .bubble-user {
      align-self: flex-end;
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid var(--green-border);
      border-bottom-right-radius: 4px;
    }
    .bubble-user .bubble-label { color: rgba(0,255,136,0.5); }
    .bubble-zka {
      align-self: flex-start;
      background: var(--surface-3);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .bubble-typing {
      color: var(--text-3);
      font-style: italic;
    }
    .typing-dots {
      display: inline-flex;
      gap: 4px;
    }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-3);
      animation: dotBounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── INPUT AREA ── */
    .chat-input-area {
      flex-shrink: 0;
      padding: 16px 32px 20px;
      border-top: 1px solid var(--border);
      background: rgba(3,3,3,0.5);
      backdrop-filter: blur(10px);
    }
    .chat-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .chat-input {
      flex: 1;
      padding: 14px 18px;
      font-family: var(--font);
      font-size: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: var(--green-border); }
    .chat-input::placeholder { color: var(--text-3); }
    .chat-send {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--green);
      color: #000;
      border: none;
      cursor: pointer;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .chat-send:hover { box-shadow: 0 0 20px rgba(0,255,136,0.3); transform: scale(1.03); }
    .chat-send:active { transform: scale(0.95); }
    .chat-send:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }
    .chat-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
    }
    .chat-footer strong { color: var(--green); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 0;
      position: relative;
      z-index: 10;
    }
    .footer-inner {
      max-width: 900px; margin: 0 auto; padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-brand { font-family: var(--mono); font-size: 13px; color: var(--text-3); }
    .footer-brand .g { color: var(--green); }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a { font-size: 12px; color: var(--text-3); text-decoration: none; transition: color 0.15s; }
    .footer-links a:hover { color: var(--green); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .chat-header { padding: 12px 20px; }
      .chat-messages { padding: 16px 20px; }
      .chat-input-area { padding: 12px 20px 16px; }
      .chat-bubble { max-width: 88%; }
      .nav-inner { padding: 0 20px; }
      .footer-inner { padding: 0 20px; }
      .chat-header-right { gap: 4px; }
      .model-select { font-size: 10px; padding: 5px 8px; }
    }
  </style>
</head>
<body>

  <!-- Loader -->
  <div id="loader">
    <div class="loader-logo">ZK<span class="g">A</span></div>
    <div class="loader-track"><div class="loader-bar"></div></div>
    <div class="loader-text">PLAYGROUND</div>
  </div>

  <!-- BG -->
  <div class="bg-grid"></div>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a href="#" class="nav-logo">ZK<span class="g">A</span> Playground</a>
      <ul class="nav-links">
        <li><a href="https://zeroknowledge0x.github.io/zk-api/">API</a></li>
        <li><a href="https://zeroknowledge0x.github.io/ZKA-Labs/">ZKA Labs</a></li>
        <li><a href="https://github.com/zeroknowledge0x/zk-playground">GitHub</a></li>
      </ul>
    </div>
  </nav>

  <!-- CHAT -->
  <div class="chat-page">

    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-avatar">Z</div>
        <div>
          <div class="chat-name">ZKA</div>
          <div class="chat-status"><span class="status-dot"></span> Online</div>
        </div>
      </div>
      <div class="chat-header-right">
        <select class="model-select" id="chat-model">
          <option value="zk-v3z">zk-v3z</option>
          <option value="zk-v2b">zk-v2b</option>
          <option value="zk-v1b">zk-v1b</option>
        </select>
        <button class="chat-clear" id="chat-clear-btn">Clear</button>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
      <div class="chat-welcome" id="chat-welcome">
        <div class="chat-welcome-icon">💬</div>
        <div class="chat-welcome-title">Hello there</div>
        <div class="chat-welcome-desc">Send a message to start chatting with ZKA. No API key needed.</div>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="chat-input-row">
        <input type="text" class="chat-input" id="chat-input" placeholder="Type a message..." autocomplete="off" />
        <button class="chat-send" id="chat-send-btn">→</button>
      </div>
      <div class="chat-footer">
        <span>Test API Key: <strong>zk-tested</strong></span>
        <span id="chat-rate"><strong>9</strong>/9 left</span>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <span class="footer-brand">ZK<span class="g">A</span> Playground &copy; 2026</span>
      <div class="footer-links">
        <a href="https://zeroknowledge0x.github.io/ZKA-Labs/">ZKA Labs</a>
        <a href="https://github.com/zeroknowledge0x/zk-playground">GitHub</a>
        <a href="https://twitter.com/zeroknowledge0x">Twitter</a>
      </div>
    </div>
  </footer>

  <script>
    // ── CONFIG ──
    const BASE = 'https://api.zk0x.app';
    const API_KEY = 'zk-tested';

    // ── STORAGE ──
    const HIST_KEY = 'zka-chat-history';
    const RATE_KEY = 'zka-chat-rate';
    const MODEL_KEY = 'zka-chat-model';
    const RATE_MAX = 9;
    const RATE_WINDOW = 3 * 60 * 60 * 1000;

    // ── LOADER ──
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1000);
    });

    // ── RATE LIMITING ──
    function getRateData() {
      try {
        const d = JSON.parse(localStorage.getItem(RATE_KEY));
        if (!d || !d.resetAt) return { count: 0, resetAt: Date.now() + RATE_WINDOW };
        if (Date.now() > d.resetAt) return { count: 0, resetAt: Date.now() + RATE_WINDOW };
        return d;
      } catch { return { count: 0, resetAt: Date.now() + RATE_WINDOW }; }
    }
    function useRate() {
      const d = getRateData();
      if (d.count >= RATE_MAX) return false;
      d.count++;
      localStorage.setItem(RATE_KEY, JSON.stringify(d));
      updateRateUI();
      return true;
    }
    function updateRateUI() {
      const d = getRateData();
      const remaining = RATE_MAX - d.count;
      const el = document.getElementById('chat-rate');
      el.innerHTML = '<strong>' + remaining + '</strong>/' + RATE_MAX + ' left';
      el.querySelector('strong').style.color = remaining <= 2 ? '#f44' : '';
    }

    // ── HISTORY ──
    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch { return []; }
    }
    function saveHistory(h) { localStorage.setItem(HIST_KEY, JSON.stringify(h)); }
    function addMsg(role, text) {
      const history = getHistory();
      history.push({ role, content: text, ts: Date.now() });
      saveHistory(history);
      renderMsg(role, text);
    }
    function renderMsg(role, text) {
      const welcome = document.getElementById('chat-welcome');
      if (welcome) welcome.remove();

      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-bubble ' + (role === 'user' ? 'bubble-user' : 'bubble-zka');
      const label = document.createElement('div');
      label.className = 'bubble-label';
      label.textContent = role === 'user' ? 'You' : 'ZKA';
      div.appendChild(label);
      const body = document.createElement('div');
      body.style.cssText = 'white-space:pre-wrap;word-break:break-word;';
      body.textContent = text;
      div.appendChild(body);
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
    function addTyping() {
      const welcome = document.getElementById('chat-welcome');
      if (welcome) welcome.remove();

      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-bubble bubble-zka bubble-typing';
      div.innerHTML = '<div class="bubble-label">ZKA</div><div class="typing-dots"><span></span><span></span><span></span></div>';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div;
    }
    function renderAll() {
      const container = document.getElementById('chat-messages');
      const history = getHistory();
      if (history.length > 0) {
        container.innerHTML = '';
        history.forEach(m => renderMsg(m.role, m.content));
      }
    }

    // ── SEND MESSAGE ──
    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (!msg) return;

      if (!useRate()) {
        const d = getRateData();
        const waitMin = Math.ceil((d.resetAt - Date.now()) / 60000);
        addMsg('zka', 'Rate limit reached. Try again in ~' + waitMin + ' minutes.');
        return;
      }

      input.value = '';
      addMsg('user', msg);

      const typingDiv = addTyping();
      const sendBtn = document.getElementById('chat-send-btn');
      sendBtn.disabled = true;

      try {
        const model = document.getElementById('chat-model').value;
        const history = getHistory();
        const messages = history.map(m => ({
          role: m.role === 'zka' ? 'assistant' : m.role,
          content: m.content
        }));
        const r = await fetch(BASE + '/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY },
          body: JSON.stringify({ model, messages, max_tokens: 1000 })
        });
        const d = await r.json();
        typingDiv.remove();
        if (d.choices && d.choices[0]) {
          addMsg('zka', d.choices[0].message.content);
        } else {
          addMsg('zka', 'Error: ' + JSON.stringify(d));
        }
      } catch (e) {
        typingDiv.remove();
        addMsg('zka', 'Error: ' + e.message);
      }
      sendBtn.disabled = false;
    }

    // ── CLEAR CHAT ──
    function clearChat() {
      localStorage.removeItem(HIST_KEY);
      const container = document.getElementById('chat-messages');
      container.innerHTML = `
        <div class="chat-welcome" id="chat-welcome">
          <div class="chat-welcome-icon">💬</div>
          <div class="chat-welcome-title">Hello there</div>
          <div class="chat-welcome-desc">Send a message to start chatting with ZKA. No API key needed.</div>
        </div>
      `;
    }

    // ── INIT ──
    document.addEventListener('DOMContentLoaded', () => {
      updateRateUI();
      renderAll();

      // Restore saved model
      const savedModel = localStorage.getItem(MODEL_KEY);
      if (savedModel) document.getElementById('chat-model').value = savedModel;
      document.getElementById('chat-model').addEventListener('change', e => {
        localStorage.setItem(MODEL_KEY, e.target.value);
      });

      // Event listeners
      const input = document.getElementById('chat-input');
      const sendBtn = document.getElementById('chat-send-btn');
      const clearBtn = document.getElementById('chat-clear-btn');

      sendBtn.addEventListener('click', sendMessage);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      clearBtn.addEventListener('click', clearChat);
    });
  </script>

</body>
</html>
