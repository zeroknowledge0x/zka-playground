<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZKA Playground — Build apps with AI, free</title>
<meta name="description" content="Describe what you want, watch it come to life. Free AI-powered app builder by ZKA Labs.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--bg-panel:#0a0a0a;--bg-surface:#111;--bg-input:#0d0d0d;--border:#1a1a1a;--border-light:#222;--text:#e5e5e5;--text-dim:#666;--text-dimmer:#444;--accent:#c8ff00;--accent-dim:rgba(200,255,0,.12);--red:#ff4444;--font-mono:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;overflow:hidden}
::selection{background:var(--accent);color:#000}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}

/* ===== LAYOUT ===== */
.app{display:flex;flex-direction:column;height:100dvh;height:100vh}

/* ===== NAVBAR ===== */
.navbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:44px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);text-decoration:none;white-space:nowrap}
.nav-brand svg{width:16px;height:16px}
.nav-sep{width:1px;height:20px;background:var(--border)}
.nav-status{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-dim)}
.nav-status .dot{width:6px;height:6px;border-radius:50%;background:#333}
.nav-status .dot.active{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.nav-status .dot.error{background:var(--red)}
.nav-model{margin-left:auto;padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg-input);color:var(--text);font-family:var(--font-mono);font-size:10px;letter-spacing:.03em;cursor:pointer;appearance:none;-webkit-appearance:none}
.nav-model:hover{border-color:var(--text-dim)}
.nav-links{display:flex;align-items:center;gap:16px;margin-left:16px}
.nav-link{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;transition:color .15s}
.nav-link:hover{color:var(--text)}
.nav-btn{padding:5px 14px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text);font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--text-dim);background:rgba(255,255,255,.03)}
.nav-btn.primary{border-color:var(--accent);color:var(--accent)}
.nav-btn.primary:hover{background:var(--accent-dim)}

/* ===== MAIN AREA ===== */
.main{display:flex;flex:1;overflow:hidden}

/* ===== CHAT PANEL ===== */
.chat-panel{width:380px;min-width:320px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--bg-panel)}
.chat-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border)}
.chat-tab{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;padding:3px 8px;border-radius:3px;transition:all .15s}
.chat-tab.active{color:var(--text);background:rgba(255,255,255,.05)}
.chat-idle{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-dimmer);margin-left:auto}
.chat-messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.chat-messages:empty::after{content:'';flex:1}

/* Messages */
.msg{font-size:12px;line-height:1.6;padding:8px 10px;border-radius:6px;max-width:100%;word-break:break-word;white-space:pre-wrap}
.msg.user{background:rgba(255,255,255,.04);border:1px solid var(--border);align-self:flex-end;color:var(--text)}
.msg.assistant{background:transparent;color:var(--text-dim);align-self:flex-start}
.msg.assistant .tool-call{display:flex;align-items:center;gap:6px;padding:4px 8px;margin:4px 0;border-radius:4px;font-size:10px;letter-spacing:.03em;color:var(--text-dimmer);background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.msg.assistant .tool-call .icon{font-size:11px;opacity:.6}
.msg.system{color:var(--text-dimmer);font-size:11px;text-align:center;padding:4px;font-style:italic}
.msg.error{color:var(--red);font-size:11px;border:1px solid rgba(255,68,68,.2);background:rgba(255,68,68,.05)}

/* Prompt chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 10px}
.chip{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:rgba(255,255,255,.02);color:var(--text-dim);font-size:11px;line-height:1.4;cursor:pointer;transition:all .15s;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip:hover{border-color:var(--text-dim);background:rgba(255,255,255,.04);color:var(--text)}
.chip-title{font-weight:600;color:var(--text);font-size:10px;letter-spacing:.04em;display:block;margin-bottom:2px}

/* Chat input */
.chat-input-area{border-top:1px solid var(--border);padding:10px 14px}
.chat-input-wrap{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;min-height:38px;max-height:120px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-input);color:var(--text);font-family:var(--font-mono);font-size:12px;resize:none;outline:none;transition:border-color .15s;line-height:1.5}
.chat-input:focus{border-color:var(--text-dim)}
.chat-input::placeholder{color:var(--text-dimmer)}
.chat-send{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;flex-shrink:0}
.chat-send:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.chat-send:disabled{opacity:.3;cursor:not-allowed}

/* ===== PREVIEW PANEL ===== */
.preview-panel{flex:1;display:flex;flex-direction:column;background:var(--bg)}
.preview-header{display:flex;align-items:center;gap:0;padding:0 14px;height:36px;border-bottom:1px solid var(--border);flex-shrink:0}
.preview-tab{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dimmer);cursor:pointer;padding:8px 12px;border-bottom:2px solid transparent;transition:all .15s}
.preview-tab:hover{color:var(--text-dim)}
.preview-tab.active{color:var(--text);border-bottom-color:var(--text)}
.preview-meta{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:10px;color:var(--text-dimmer);letter-spacing:.03em}
.preview-actions{display:flex;gap:6px}
.preview-action{padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text-dim);font-family:var(--font-mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.preview-action:hover{border-color:var(--text-dim);color:var(--text)}

/* Responsive preview buttons */
.preview-responsive{display:flex;gap:2px;margin-left:8px}
.preview-responsive button{padding:3px 6px;border:1px solid transparent;border-radius:3px;background:transparent;color:var(--text-dimmer);font-size:11px;cursor:pointer;transition:all .15s}
.preview-responsive button:hover{color:var(--text-dim)}
.preview-responsive button.active{color:var(--text);background:rgba(255,255,255,.05);border-color:var(--border)}

/* Preview iframe */
.preview-body{flex:1;position:relative;overflow:hidden;background:var(--bg)}
.preview-body iframe{width:100%;height:100%;border:none;background:#fff}
.preview-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-dimmer);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.preview-empty svg{width:32px;height:32px;opacity:.15}

/* Code panel */
.code-body{flex:1;overflow:auto;padding:0;background:var(--bg)}
.code-file{padding:16px 20px}
.code-path{font-size:10px;letter-spacing:.03em;color:var(--text-dimmer);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.code-content{font-size:12px;line-height:1.7;color:var(--text-dim);white-space:pre-wrap;word-break:break-word;font-family:var(--font-mono);tab-size:2}
.code-content .line{display:block}
.code-content .line-num{display:inline-block;width:36px;text-align:right;padding-right:12px;color:var(--text-dimmer);opacity:.4;user-select:none;pointer-events:none}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .main{flex-direction:column}
  .chat-panel{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--border);max-height:45vh}
  .nav-links{display:none}
  .chat-messages{padding:10px}
  .chips{padding:0 10px 8px}
}
@media(max-width:480px){
  .navbar{padding:0 10px;gap:8px}
  .nav-model{font-size:9px;padding:3px 6px}
  .chat-panel{max-height:50vh}
}

/* ===== LOADING ===== */
.generating-bar{height:2px;background:var(--bg);overflow:hidden;position:relative}
.generating-bar.active::after{content:'';position:absolute;left:-40%;top:0;width:40%;height:100%;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:gen-slide 1.2s ease-in-out infinite}
@keyframes gen-slide{0%{left:-40%}100%{left:100%}}

/* ===== STATUS ANIMATION ===== */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-generating{animation:pulse 1.5s ease-in-out infinite}

/* ===== RESPONSIVE PREVIEW ===== */
.preview-frame-wrapper{display:flex;justify-content:center;align-items:flex-start;height:100%;overflow:auto;background:#0d0d0d}
.preview-frame-wrapper.mobile{padding:20px}
.preview-frame-wrapper.mobile iframe{width:375px;height:667px;border-radius:24px;border:3px solid #333;box-shadow:0 0 40px rgba(0,0,0,.5)}
.preview-frame-wrapper.tablet{padding:16px}
.preview-frame-wrapper.tablet iframe{width:768px;height:100%;border-radius:12px;border:2px solid #222}
.preview-frame-wrapper.desktop iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>
<div class="app">

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="nav-brand" href="https://zka-labs.github.io" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>
      ZKA PLAYGROUND
    </a>
    <div class="nav-sep"></div>
    <div class="nav-status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">IDLE</span>
    </div>
    <select class="nav-model" id="modelSelect" title="Model">
      <option value="zk-v3z">ZK-V3Z (FLAGSHIP)</option>
      <option value="zk-v2b">ZK-V2B (FAST)</option>
      <option value="zk-v1b">ZK-V1B (LITE)</option>
    </select>
    <div class="nav-links">
      <a class="nav-link" href="https://zka-labs.github.io" target="_blank">LABS</a>
      <a class="nav-link" href="https://zeroknowledge0x.github.io/zk-api" target="_blank">API</a>
      <button class="nav-btn primary" onclick="newProject()">NEW PROJECT</button>
    </div>
  </nav>

  <div class="generating-bar" id="genBar"></div>

  <!-- MAIN -->
  <div class="main">

    <!-- CHAT PANEL -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <span class="chat-tab active">CHAT</span>
        <span class="chat-tab" onclick="toggleLibrary()">+ LIBRARY</span>
        <span class="chat-idle" id="chatIdle">IDLE</span>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <!-- Prompt chips -->
      <div class="chips" id="chips">
        <button class="chip" onclick="useChip(this)" data-prompt="Build a responsive portfolio site with hero section, skills grid, project cards with hover effects, and a contact form. Dark theme with gradient accents."><span class="chip-title">PORTFOLIO</span>Hero + skills + projects + contact form</button>
        <button class="chip" onclick="useChip(this)" data-prompt="Build a task management app with add/edit/delete tasks, priority levels (low/medium/high with colors), category filters, and a progress bar showing completion percentage. Persist to localStorage."><span class="chip-title">TASK MANAGER</span>CRUD + priorities + filters + progress</button>
        <button class="chip" onclick="useChip(this)" data-prompt="Build a weather dashboard that accepts city input, shows current temperature, humidity, wind speed, and a 5-day forecast. Use a clean card layout with weather icons."><span class="chip-title">WEATHER DASHBOARD</span>City search + 5-day forecast + cards</button>
        <button class="chip" onclick="useChip(this)" data-prompt="Build a restaurant landing page with a hero banner, menu categories with food items and prices, photo gallery grid, reservation form, and customer reviews carousel."><span class="chip-title">RESTAURANT</span>Menu + gallery + reservations + reviews</button>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea class="chat-input" id="chatInput" placeholder="Describe what to build..." rows="1" maxlength="5000"></textarea>
          <button class="chat-send" id="sendBtn" onclick="sendMessage()" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- PREVIEW PANEL -->
    <div class="preview-panel">
      <div class="preview-header">
        <span class="preview-tab active" data-tab="preview" onclick="switchTab('preview')">PREVIEW</span>
        <span class="preview-tab" data-tab="code" onclick="switchTab('code')">CODE</span>
        <div class="preview-meta">
          <span id="fileCount">FILES 0</span>
          <span id="genTime"></span>
        </div>
        <div class="preview-responsive" id="responsiveBtns">
          <button class="active" data-mode="desktop" onclick="setPreviewMode('desktop')" title="Desktop">🖥</button>
          <button data-mode="tablet" onclick="setPreviewMode('tablet')" title="Tablet">📱</button>
          <button data-mode="mobile" onclick="setPreviewMode('mobile')" title="Mobile">📲</button>
        </div>
        <div class="preview-actions">
          <button class="preview-action" onclick="downloadCode()" id="dlBtn" style="display:none">↓ DOWNLOAD</button>
        </div>
      </div>

      <div class="preview-body" id="previewBody">
        <div class="preview-frame-wrapper desktop" id="frameWrapper">
          <iframe id="previewFrame" sandbox="allow-scripts allow-modals" title="Preview"></iframe>
        </div>
        <div class="preview-empty" id="previewEmpty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <span>WAITING FOR BUILD</span>
          <span style="font-size:9px;opacity:.5">Send a prompt to start</span>
        </div>
        <div class="code-body" id="codeBody" style="display:none">
          <div class="code-file" id="codeFile">
            <div class="code-path" id="codePath">src/App.tsx</div>
            <div class="code-content" id="codeContent"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const PROXY = 'https://proxy.zka-labs.workers.dev';
const LS_KEY = 'zka_pg_history';

let busy = false;
let messages = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
let generatedHTML = '';
let genStartTime = 0;
let currentTab = 'preview';
let previewMode = 'desktop';

// ===== INIT =====
(function init() {
  const input = document.getElementById('chatInput');
  input.addEventListener('input', autoResize);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !busy && input.value.trim()) {
      e.preventDefault();
      sendMessage();
    }
  });
  renderMessages();
  if (messages.length > 0) {
    document.getElementById('chips').style.display = 'none';
  }
})();

function autoResize() {
  const el = document.getElementById('chatInput');
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('sendBtn').disabled = !el.value.trim();
}

// ===== MESSAGES =====
function addMsg(role, content) {
  messages.push({ role, content, ts: Date.now() });
  if (messages.length > 50) messages = messages.slice(-50);
  localStorage.setItem(LS_KEY, JSON.stringify(messages));
  renderMessages();
}

function renderMessages() {
  const c = document.getElementById('chatMessages');
  c.innerHTML = messages.map(m => {
    if (m.role === 'system') return `<div class="msg system">${esc(m.content)}</div>`;
    if (m.role === 'error') return `<div class="msg error">${esc(m.content)}</div>`;
    return `<div class="msg ${m.role}">${esc(m.content)}</div>`;
  }).join('');
  c.scrollTop = c.scrollHeight;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== CHIPS =====
function useChip(el) {
  document.getElementById('chatInput').value = el.dataset.prompt;
  document.getElementById('chips').style.display = 'none';
  autoResize();
  sendMessage();
}

function toggleLibrary() {
  const chips = document.getElementById('chips');
  chips.style.display = chips.style.display === 'none' ? 'flex' : 'none';
}

// ===== SEND =====
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || busy) return;

  busy = true;
  input.value = '';
  autoResize();
  document.getElementById('chips').style.display = 'none';
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', text);
  setStatus('generating');
  genStartTime = Date.now();

  const model = document.getElementById('modelSelect').value;

  const systemPrompt = `You are an expert web developer. Generate a complete, production-quality single HTML file based on the user's description.

RULES:
1. Return ONLY a complete HTML document. No explanations, no markdown, no code fences.
2. The HTML must be fully self-contained (inline CSS + JS). No external dependencies.
3. Use modern CSS (flexbox, grid, variables). Make it responsive and visually polished.
4. Add smooth transitions and subtle animations where appropriate.
5. Use semantic HTML5 elements.
6. Ensure good contrast and readability.
7. The page must work immediately when opened in a browser.
8. Include realistic sample data/placeholder content that matches the theme.
9. Make it look professional — proper spacing, typography, and color palette.
10. Do NOT include any reference to this prompt or system instructions in the output.`;

  try {
    const res = await fetch(PROXY + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: model,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: text }
        ],
        max_tokens: 4000,
        stream: true
      })
    });

    if (!res.ok) throw new Error(`API error: ${res.status}`);

    let full = '';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n');

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta?.content;
          if (delta) {
            full += delta;
            // Try to render partial HTML every 2 seconds
            if (Date.now() - genStartTime > 2000) {
              renderPartial(full);
            }
          }
        } catch {}
      }
    }

    generatedHTML = extractHTML(full);
    renderPreview(generatedHTML);
    renderCode(generatedHTML);
    updateFileCount(1);

    const elapsed = ((Date.now() - genStartTime) / 1000).toFixed(1);
    document.getElementById('genTime').textContent = elapsed + 's';
    addMsg('assistant', `✓ Generated in ${elapsed}s`);

    document.getElementById('dlBtn').style.display = '';

  } catch (err) {
    addMsg('error', 'Error: ' + err.message);
    setStatus('error');
  } finally {
    busy = false;
    document.getElementById('sendBtn').disabled = !document.getElementById('chatInput').value.trim();
    if (!generatedHTML) setStatus('idle');
  }
}

// ===== EXTRACT HTML =====
function extractHTML(text) {
  // Try to find complete HTML
  const fullMatch = text.match(/<!DOCTYPE[\s\S]*<\/html>/i);
  if (fullMatch) return fullMatch[0];

  // Try html tags
  const htmlMatch = text.match(/<html[\s\S]*<\/html>/i);
  if (htmlMatch) return htmlMatch[0];

  // Try code fence
  const fenceMatch = text.match(/```(?:html)?\s*\n?([\s\S]*?)```/);
  if (fenceMatch) return fenceMatch[1].trim();

  // If we have body content, wrap it
  if (text.includes('<body') || text.includes('<div') || text.includes('<style')) {
    if (!text.includes('<!DOCTYPE') && !text.includes('<html')) {
      return `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head><body>${text}</body></html>`;
    }
  }

  return text;
}

// ===== RENDER PREVIEW =====
function renderPartial(text) {
  const html = extractHTML(text);
  if (html.length < 50) return;
  renderPreview(html);
}

function renderPreview(html) {
  const frame = document.getElementById('previewFrame');
  const empty = document.getElementById('previewEmpty');
  empty.style.display = 'none';
  frame.style.display = '';
  frame.srcdoc = html;
}

function renderCode(html) {
  const content = document.getElementById('codeContent');
  const lines = html.split('\n');
  content.innerHTML = lines.map((line, i) =>
    `<span class="line"><span class="line-num">${i + 1}</span>${esc(line)}</span>`
  ).join('');
}

function updateFileCount(n) {
  document.getElementById('fileCount').textContent = `FILES ${n}`;
}

// ===== TABS =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.preview-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('previewBody').querySelector('.preview-frame-wrapper').style.display = tab === 'preview' ? '' : 'none';
  document.getElementById('previewEmpty').style.display = tab === 'preview' && !generatedHTML ? '' : 'none';
  document.getElementById('codeBody').style.display = tab === 'code' ? '' : 'none';
}

// ===== PREVIEW MODE =====
function setPreviewMode(mode) {
  previewMode = mode;
  const wrapper = document.getElementById('frameWrapper');
  wrapper.className = 'preview-frame-wrapper ' + mode;
  document.querySelectorAll('#responsiveBtns button').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
}

// ===== STATUS =====
function setStatus(state) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const idle = document.getElementById('chatIdle');
  const bar = document.getElementById('genBar');

  dot.className = 'dot';
  bar.className = 'generating-bar';

  if (state === 'generating') {
    dot.classList.add('active');
    text.textContent = 'BUILDING...NOW';
    text.classList.add('status-generating');
    idle.textContent = 'GENERATING';
    bar.classList.add('active');
  } else if (state === 'error') {
    dot.classList.add('error');
    text.textContent = 'ERROR';
    text.classList.remove('status-generating');
    idle.textContent = 'ERROR';
  } else {
    text.textContent = 'IDLE';
    text.classList.remove('status-generating');
    idle.textContent = 'IDLE';
  }
}

// ===== DOWNLOAD =====
function downloadCode() {
  if (!generatedHTML) return;
  const blob = new Blob([generatedHTML], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'zka-project.html';
  a.click();
  URL.revokeObjectURL(url);
}

// ===== NEW PROJECT =====
function newProject() {
  messages = [];
  generatedHTML = '';
  localStorage.removeItem(LS_KEY);
  renderMessages();
  document.getElementById('chips').style.display = 'flex';
  document.getElementById('previewFrame').style.display = 'none';
  document.getElementById('previewFrame').srcdoc = '';
  document.getElementById('previewEmpty').style.display = '';
  document.getElementById('codeContent').innerHTML = '';
  document.getElementById('dlBtn').style.display = 'none';
  document.getElementById('genTime').textContent = '';
  document.getElementById('fileCount').textContent = 'FILES 0';
  setStatus('idle');
  switchTab('preview');
}

// ===== HEALTH CHECK =====
async function checkHealth() {
  try {
    const res = await fetch(PROXY + '/health');
    const data = await res.json();
    if (data.status === 'ok') {
      document.getElementById('statusDot').classList.add('active');
    }
  } catch {}
}
checkHealth();
</script>
